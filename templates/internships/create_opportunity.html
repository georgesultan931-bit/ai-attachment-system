{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Post Internship / Attachment Opportunity</h1>

<div class="card shadow border-0">
    <div class="card-body">

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Company Name</label>
                    <input type="text"
                           class="form-control"
                           value="{{ employer.company_name }}"
                           readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Company Email</label>
                    <input type="email"
                           class="form-control"
                           value="{{ employer.company_email }}"
                           readonly>
                </div>
            </div>

            {{ form.as_p }}

            <button class="btn btn-primary" type="submit">
                Publish Opportunity
            </button>
        </form>

    </div>
</div>

{% endblock %}
