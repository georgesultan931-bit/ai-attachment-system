{% extends 'base.html' %}

{% block content %}
<div style="max-width:450px; margin:80px auto; background:white; padding:40px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <h2 style="text-align:center; margin-bottom:20px;">Forgot Password?</h2>
    <p style="text-align:center; color:#666; margin-bottom:30px;">Enter your email to receive a reset link</p>
    
    {% if messages %}
        {% for message in messages %}
            <div style="padding:12px; border-radius:8px; margin-bottom:20px; {% if message.tags == 'success' %}background:#d4edda; color:#155724;{% else %}background:#f8d7da; color:#721c24;{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Your Email Address" required style="width:100%; padding:14px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
        <button type="submit" style="width:100%; padding:14px; background:#007bff; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer;">Send Reset Link</button>
    </form>
    
    <p style="text-align:center; margin-top:25px;"><a href="{% url 'login' %}" style="color:#007bff; text-decoration:none;">← Back to Login</a></p>
</div>
{% endblock %}
