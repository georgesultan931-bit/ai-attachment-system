{% extends 'base.html' %}

{% block content %}
<div style="max-width:500px; margin:100px auto; background:white; padding:50px; border-radius:12px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <div style="font-size:70px; color:#28a745; margin-bottom:20px;">✓</div>
    <h2 style="color:#28a745; margin-bottom:20px;">Password Reset Complete!</h2>
    <p style="color:#555; line-height:1.6;">Your password has been successfully reset.</p>
    <p style="color:#555; line-height:1.6;">You can now log in with your new password.</p>
    <a href="{% url 'login' %}" style="display:inline-block; margin-top:25px; padding:14px 40px; background:#007bff; color:white; text-decoration:none; border-radius:8px;">Log In Now</a>
</div>
{% endblock %}
