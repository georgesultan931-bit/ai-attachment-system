{% extends "base.html" %}

{% block content %}

        <div class="card-body p-4 p-md-5 text-center">
            <h2 class="mb-3">Password Changed</h2>

            <p class="text-muted mb-4">

            </p>

            <a href="{% url 'login' %}" class="btn btn-success btn-lg w-100">
                Login Now

        </div>
    </div>
</div>
{% endblock %}
