<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset | AI Attachment System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, .16), transparent 34%),
                linear-gradient(135deg, #eef6f4 0%, #f8fafc 48%, #fff7ed 100%);
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-card {
            width: min(440px, 100%);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, .12);
            padding: clamp(24px, 5vw, 38px);
        }

        .back-link {
            display: inline-flex;
            margin-bottom: 24px;
            color: #0f766e;
            font-weight: 800;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        h1 {
            color: #0f172a;
            font-size: 1.7rem;
            line-height: 1.18;
            letter-spacing: 0;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        label {
            display: block;
            color: #1f2937;
            font-weight: 800;
            margin-bottom: 8px;
        }

        input[type="email"] {
            width: 100%;
            min-height: 48px;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 16px;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #0f766e;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, .13);
        }

        .field-error {
            color: #991b1b;
            font-size: .85rem;
            margin: -8px 0 14px;
        }

        button {
            width: 100%;
            min-height: 50px;
            padding: 12px 16px;
            background: #0f766e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
        }

        button:hover {
            background: #115e59;
        }
    </style>
</head>
<body>
    <main class="reset-card">
        <a href="{% url 'login' %}" class="back-link">Back to login</a>

        <h1>Reset your password</h1>
        <p>Enter the email on your account and the system will send a reset link if the address is registered.</p>

        <form method="post">
            {% csrf_token %}

            <label for="id_email">Email address</label>
            <input type="email"
                   name="email"
                   id="id_email"
                   autocomplete="email"
                   required
                   placeholder="Enter your email address"
                   value="{{ form.email.value|default:'' }}">

            {% if form.email.errors %}
                <div class="field-error">{{ form.email.errors.0 }}</div>
            {% endif %}

            <button type="submit">Send reset link</button>
        </form>
    </main>
</body>
</html>
