{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0" style="border-radius:24px;">

            <div class="card-body p-5 text-center">

                <h2 class="fw-bold mb-3">
                    Verify Your Email
                </h2>

                <p class="text-muted">
                    Enter the 6-digit verification code sent by the admin to your email and WhatsApp.
                </p>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-4">
                        {{ form.otp_code }}
                    </div>

                    <button class="btn btn-primary w-100">
                        Verify OTP
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
