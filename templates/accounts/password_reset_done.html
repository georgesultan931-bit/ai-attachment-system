{% extends 'base.html' %}

{% block content %}
<div style="max-width:500px; margin:100px auto; background:white; padding:50px; border-radius:12px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <div style="font-size:70px; margin-bottom:20px;">📧</div>
    <h2 style="color:#28a745; margin-bottom:20px;">Check Your Email</h2>
    <p style="color:#555; line-height:1.6;">We've sent a password reset link to your email address.</p>
    <p style="color:#555; line-height:1.6;">Click the link in the email to reset your password.</p>
    <p style="color:#888; font-size:13px; margin-top:20px;">The link expires in 24 hours.</p>
    <a href="{% url 'login' %}" style="display:inline-block; margin-top:25px; color:#007bff; text-decoration:none;">Return to Login</a>
</div>
{% endblock %}
