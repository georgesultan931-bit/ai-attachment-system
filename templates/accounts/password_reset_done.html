<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email | AI Attachment System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            padding: 34px;
            text-align: center;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 28px;
        }

        p {
            color: #64748b;
            line-height: 1.6;
        }

        a {
            display: block;
            margin-top: 22px;
            padding: 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        a:hover {
            background: #1d4ed8;
        }

        .footer {
            text-align: center;
            margin-top: 22px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="page">
    <div>
        <div class="card">
            <h1>Check Your Email</h1>

            <p>
                If an account exists with that email, a password reset link has been sent.
            </p>

            <a href="{% url 'login' %}">Back to Login</a>
        </div>

        <div class="footer">
            AI Internship & Attachment System
        </div>
    </div>
</div>
</body>
</html>
