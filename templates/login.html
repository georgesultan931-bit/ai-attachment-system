<!DOCTYPE html>
<html>
<head>
    <title>Login | AI Attachment System</title>
</head>
<body>
    <h2>AI Internship & Attachment Matching System</h2>
    <h3>Login</h3>

    {% if form.errors %}
        <p style="color:red;">Invalid username or password</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
</body>
</html>
