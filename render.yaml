databases:
  - name: ai-attachment-system-db
    plan: free
    databaseName: ai_attachment_system
    user: ai_attachment_system

services:
  - type: web
    name: ai-attachment-system
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-attachment-system-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PUBLIC_SITE_URL
        value: "https://ai-attachment-system-1.onrender.com"
      - key: EMAIL_ALLOW_INSECURE_SMTP_SSL
        value: "False"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_SENDER_NAME
        value: "AI Internship & Attachment System"
      - key: EMAIL_ALLOW_CUSTOM_FROM
        value: "False"
      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false
      - key: DJANGO_ADMIN_USERNAME
        value: "admin"
      - key: DJANGO_ADMIN_EMAIL
        value: "admin@example.com"
      - key: DJANGO_ADMIN_PASSWORD
        sync: false
      - key: DJANGO_ADMIN_FORCE_PASSWORD_RESET
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.4"
